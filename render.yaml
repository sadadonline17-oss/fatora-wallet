services:
  - type: web
    name: fatora-wallet
    env: php
    buildCommand: "composer install --no-dev && php artisan key:generate --force"
    startCommand: "php artisan serve --host=0.0.0.0 --port=$PORT"
    healthCheckPath: /health
    plan: free
    regions:
      - frankfurt
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: KNET_MERCHANT_ID
        sync: false
      - key: KNET_SHARED_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: fatora-db
          property: connection_string
      - key: CACHE_URL
        fromService:
          type: redis
          name: fatora-redis
          envVarKey: REDIS_URL

  - type: redis
    name: fatora-redis
    plan: free
    ipAllowance: 10
    regions:
      - frankfurt

databases:
  - name: fatora-db
    plan: free
    databaseName: fatora_wallet
    ipAllowance: 2
    regions:
      - frankfurt
