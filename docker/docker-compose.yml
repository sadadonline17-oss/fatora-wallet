version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: fatora-wallet-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./docker/php.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=https://fatora-wallet.com
    depends_on:
      - mysql
      - redis
    networks:
      - fatora-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: fatora-wallet-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - fatora-network

  mysql:
    image: mysql:8.0
    container_name: fatora-wallet-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: fatora_wallet
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root_secret_password}
      MYSQL_USER: fatora
      MYSQL_PASSWORD: ${DB_PASSWORD:-fatora_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql.cnf:/etc/mysql/conf.d/custom.cnf
    networks:
      - fatora-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fatora-wallet-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./docker/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - fatora-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  queue:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: fatora-wallet-queue
    restart: unless-stopped
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    volumes:
      - ./:/var/www
    depends_on:
      - mysql
      - redis
    networks:
      - fatora-network

  scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: fatora-wallet-scheduler
    restart: unless-stopped
    command: sh -c "while true; do php artisan schedule:run; sleep 60; done"
    volumes:
      - ./:/var/www
    depends_on:
      - mysql
      - redis
    networks:
      - fatora-network

volumes:
  mysql_data:
  redis_data:

networks:
  fatora-network:
    driver: bridge
